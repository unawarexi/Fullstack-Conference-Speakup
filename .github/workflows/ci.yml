name: CI – Lint, Test & Build

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.27.4'
  JAVA_VERSION: '17'

jobs:
  # ──────────────────────────────────────────────
  # 1. Analyze & Format
  # ──────────────────────────────────────────────
  analyze:
    name: Analyze & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

  # ──────────────────────────────────────────────
  # 2. Unit & Widget Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit & widget tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Flutter-conference-speakup/coverage/lcov.info
          retention-days: 14

  # ──────────────────────────────────────────────
  # 3. Build Android (APK + AAB)
  # ──────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/android/**/*.gradle*', 'Flutter-conference-speakup/android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (fat)
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      - name: Build APK (split per ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --obfuscate \
            --split-debug-info=build/debug-info-split

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info-aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            Flutter-conference-speakup/build/app/outputs/flutter-apk/*.apk
            Flutter-conference-speakup/build/app/outputs/bundle/release/*.aab
          retention-days: 14

  # ──────────────────────────────────────────────
  # 4. Build iOS (IPA)
  # ──────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Flutter-conference-speakup/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --obfuscate \
            --split-debug-info=build/debug-info-ios

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Flutter-conference-speakup/build/ios/iphoneos/Runner.app
          retention-days: 14

  # ──────────────────────────────────────────────
  # 5. Build Linux
  # ──────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar czf ../../../../../linux-release.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Flutter-conference-speakup/linux-release.tar.gz
          retention-days: 14

  # ──────────────────────────────────────────────
  # 6. Build Windows
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath windows-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Flutter-conference-speakup/windows-release.zip
          retention-days: 14

  # ──────────────────────────────────────────────
  # 7. Build macOS
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Flutter-conference-speakup/macos/Pods
          key: pods-macos-${{ hashFiles('Flutter-conference-speakup/macos/Podfile.lock') }}
          restore-keys: pods-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install CocoaPods
        run: cd macos && pod install --repo-update

      - name: Build macOS
        run: flutter build macos --release

      - name: Archive macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../macos-release.zip *.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Flutter-conference-speakup/macos-release.zip
          retention-days: 14

  # ──────────────────────────────────────────────
  # 8. Build Web
  # ──────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: Flutter-conference-speakup
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosheez/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            Flutter-conference-speakup/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('Flutter-conference-speakup/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit

      - name: Archive Web build
        run: |
          cd build/web
          tar czf ../../web-release.tar.gz .

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: Flutter-conference-speakup/web-release.tar.gz
          retention-days: 14
