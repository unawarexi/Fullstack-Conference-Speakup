# ============================================================================
# SpeakUp AI — CI/CD Pipeline
# Lint → Test → Security Scan → Build Docker → Deploy
# ============================================================================

name: SpeakUp AI CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "Fastapi-conference-speakup/**"
      - ".github/workflows/fastapi-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "Fastapi-conference-speakup/**"

concurrency:
  group: fastapi-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/speakup-ai
  WORKING_DIR: Fastapi-conference-speakup

defaults:
  run:
    working-directory: Fastapi-conference-speakup

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint, Format & Type Check
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-lint-${{ runner.os }}-${{ hashFiles('Fastapi-conference-speakup/pyproject.toml') }}
          restore-keys: pip-lint-${{ runner.os }}-

      - name: Install linters
        run: pip install ruff mypy pydantic pydantic-settings fastapi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 2. Security Scanning
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install bandit safety

      - name: Bandit security linter
        run: bandit -r app/ -c pyproject.toml -ll --exit-zero
        continue-on-error: true

      - name: Check known vulnerabilities
        run: pip install -r requirements.txt && safety check --output text
        continue-on-error: true

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 3. Unit & Integration Tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: speakup
          POSTGRES_PASSWORD: speakup_test
          POSTGRES_DB: speakup_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U speakup"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://speakup:speakup_test@localhost:5432/speakup_ai_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: test-secret-key-for-ci-only
      OPENAI_API_KEY: sk-test
      ANTHROPIC_API_KEY: sk-ant-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ runner.os }}-${{ hashFiles('Fastapi-conference-speakup/pyproject.toml') }}
          restore-keys: pip-test-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-coverage
          path: ${{ env.WORKING_DIR }}/coverage.xml
          retention-days: 14

  # ──────────────────────────────────────────────
  # 4. Build & Push Docker Image
  # ──────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ──────────────────────────────────────────────
  # 5. Deploy to Kubernetes
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name speakup-cluster --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/speakup-ai \
            speakup-ai=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n speakup
          kubectl rollout status deployment/speakup-ai -n speakup --timeout=300s
