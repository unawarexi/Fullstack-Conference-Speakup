
# ============================================================================
# SpeakUp — Nginx Server Configuration
# Default server block
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # ==========================================================================
    # Security Headers
    # ==========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Allow camera/microphone for video conferencing
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    
    # ==========================================================================
    # Health Check Endpoint
    # ==========================================================================
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
    
    # ==========================================================================
    # General API Proxy
    # ==========================================================================
    location /api {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # ==========================================================================
    # Auth Endpoints (Stricter Rate Limiting)
    # ==========================================================================
    location /api/v1/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;
        
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }
    
    # ==========================================================================
    # Meeting Endpoints (Moderate Rate Limiting)
    # ==========================================================================
    location /api/v1/meetings {
        limit_req zone=meeting_limit burst=30 nodelay;
        limit_conn conn_limit 15;
        
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }
    
    # ==========================================================================
    # Chat Endpoints (Higher Frequency)
    # ==========================================================================
    location /api/v1/chat {
        limit_req zone=chat_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }
    
    # ==========================================================================
    # Billing Endpoints (Strict Rate Limiting)
    # ==========================================================================
    location /api/v1/billing {
        limit_req zone=billing_limit burst=10 nodelay;
        limit_conn conn_limit 5;
        
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
    }
    
    # ==========================================================================
    # WebSocket Support (Socket.IO — real-time meeting communication)
    # ==========================================================================
    location /socket.io {
        proxy_pass http://speakup_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout (24 hours for persistent ride tracking)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # ==========================================================================
    # Error Pages
    # ==========================================================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    # ==========================================================================
    # Block Sensitive Files
    # ==========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ^/(package\.json|package-lock\.json|\.env|\.git|prisma|tsconfig) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
