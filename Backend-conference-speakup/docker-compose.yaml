# ============================================================================
# SpeakUp — Docker Compose (Development)
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # SpeakUp API
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      target: production
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://speakup:speakup_dev@postgres:5432/speakup_dev?schema=public
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_HOST=${LIVEKIT_HOST:-http://livekit:7880}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev_encryption_key_32_chars_long!}
      - AI_SERVICE_URL=http://speakup-ai:8000/api/v1
      - AI_INTERNAL_API_KEY=${AI_INTERNAL_API_KEY:-dev_ai_internal_key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: speakup
      POSTGRES_PASSWORD: speakup_dev
      POSTGRES_DB: speakup_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speakup -d speakup_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Kafka + Zookeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # LiveKit Server (local development)
  # --------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: --dev --bind 0.0.0.0
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Mailhog (SMTP testing)
  # --------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - speakup-ai
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # SpeakUp AI Intelligence Plane (FastAPI)
  # --------------------------------------------------------------------------
  speakup-ai:
    build:
      context: ../Fastapi-conference-speakup
      target: development
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - INTERNAL_API_KEY=${AI_INTERNAL_API_KEY:-dev_ai_internal_key}
      - KAFKA_BROKERS=kafka:9092
      - REDIS_URL=redis://redis:6379/1
      - DATABASE_URL=postgresql+asyncpg://speakup:speakup_dev@postgres:5432/speakup_dev
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-speakup_dev}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ../Fastapi-conference-speakup:/app
      - ai_model_cache:/app/.model_cache
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Qdrant Vector Database (AI memory)
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Neo4j Graph Database (AI meeting memory graph)
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-speakup_dev}
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  ai_model_cache:
  qdrant_data:
  neo4j_data: