# ============================================================================
# SpeakUp — Kubernetes Service
# ClusterIP service for internal communication
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: speakup-api
  namespace: speakup
  labels:
    app: speakup-api
spec:
  type: ClusterIP
  selector:
    app: speakup-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP

---
# ============================================================================
# SpeakUp — Kubernetes Ingress
# Nginx Ingress with TLS
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: speakup-api-ingress
  namespace: speakup
  labels:
    app: speakup-api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # WebSocket support for ride tracking
    nginx.ingress.kubernetes.io/websocket-services: "speakup-api"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.speakup.app
      secretName: speakup-api-tls
  rules:
    - host: api.speakup.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: speakup-api
                port:
                  number: 80

---
# ============================================================================
# SpeakUp — Horizontal Pod Autoscaler
# Auto-scale based on CPU/Memory
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: speakup-api-hpa
  namespace: speakup
  labels:
    app: speakup-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: speakup-api
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max

---
# ============================================================================
# SpeakUp — Pod Disruption Budget
# Ensure minimum availability during disruptions
# ============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: speakup-api-pdb
  namespace: speakup
  labels:
    app: speakup-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: speakup-api