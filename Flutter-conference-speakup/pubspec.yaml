name: flutter_conference_speakup
description: "SpeakUp - Cross-platform video conferencing application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

# To see which dependencies have newer versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8


   # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.2.0
  firebase_messaging: ^15.2.0
  cloud_firestore: ^5.4.4

  # Auth
  google_sign_in: ^7.2.0
  # github_sign_in_plus: ^0.0.2  # Incompatible with http ^1.x — use Firebase GithubAuthProvider instead
  local_auth: ^3.0.1

  # Networking & API
  dio: ^5.9.2
  socket_io_client: ^3.1.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # WebRTC / Video
  # agora_rtc_engine: ^6.6.2  # Pinned to ffi ^1.x — conflicts with modern packages
  livekit_client: ^2.3.3  # LiveKit SFU client (aligned with structure.md)

  # Storage
  flutter_secure_storage: ^10.0.0
  get_storage: ^2.1.1
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.20.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.1
  url_launcher: ^6.3.2
  wakelock_plus: ^1.2.8
  pull_to_refresh: ^2.0.0
  image_picker: ^1.2.1
  file_picker: ^8.1.6
  flutter_dotenv: ^6.0.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  connectivity_plus: ^6.1.1
  logger: ^2.5.0

  # Monitoring
  sentry_flutter: ^9.0.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mockito: ^5.4.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  fake_async: ^1.3.2
  network_image_mock: ^2.1.1
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/logo/
    - .env


  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
